name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: usstm_portal
          POSTGRES_USER: usstm
          POSTGRES_PASSWORD: usstm
        options: >-
          --health-cmd "pg_isready -U usstm -d usstm_portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://usstm:usstm@localhost:5432/usstm_portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci
